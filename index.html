<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coordinate Asset Mapper</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Input Panel */
        #panel { 
            width: 380px; background: #2c3e50; color: white; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px; box-sizing: border-box;
            z-index: 1000; box-shadow: 5px 0 15px rgba(0,0,0,0.3);
        }

        h2 { font-size: 1.1rem; margin: 0; color: #ecf0f1; border-bottom: 1px solid #5d6d7e; padding-bottom: 10px; }
        
        .format-hint { font-size: 0.75rem; color: #bdc3c7; background: #34495e; padding: 8px; border-radius: 4px; line-height: 1.4; }
        
        textarea { 
            width: 100%; height: 150px; background: #ecf0f1; border: none; border-radius: 4px;
            padding: 10px; box-sizing: border-box; font-family: monospace; font-size: 0.85rem;
        }

        /* Icon Grid */
        .icon-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .icon-btn { 
            background: #34495e; border: 2px solid transparent; border-radius: 6px; 
            padding: 10px; font-size: 1.5rem; cursor: pointer; text-align: center; transition: 0.2s;
        }
        .icon-btn:hover { background: #5d6d7e; }
        .icon-btn.selected { border-color: #3498db; background: #5d6d7e; }

        button.main-btn { 
            padding: 12px; border: none; border-radius: 4px; font-weight: bold; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }
        #plot-btn { background: #3498db; color: white; }
        #snap-btn { background: #27ae60; color: white; }
        button:active { transform: scale(0.98); }

        /* Map Area */
        #map { flex-grow: 1; z-index: 1; background: #1a1a1a; }
    </style>
</head>
<body>

    <div id="panel">
        <h2>Asset Input</h2>
        <div class="format-hint">
            <strong>Format:</strong> Label, Longitude, Latitude<br>
            <em>Example:</em><br>
            Point 1, 92.13, 42.32<br>
            Hospital Point, 92.122, 41.352
        </div>
        
        <textarea id="data-input" placeholder="Enter coordinates here..."></textarea>

        <h2>Select Icon</h2>
        <div class="icon-grid">
            <div class="icon-btn selected" data-icon="📍">📍</div>
            <div class="icon-btn" data-icon="🏥">🏥</div>
            <div class="icon-btn" data-icon="🏫">🏫</div>
            <div class="icon-btn" data-icon="🏗️">🏗️</div>
            <div class="icon-btn" data-icon="🚩">🚩</div>
            <div class="icon-btn" data-icon="🚧">🚧</div>
            <div class="icon-btn" data-icon="💧">💧</div>
            <div class="icon-btn" data-icon="🌳">🌳</div>
        </div>

        <button id="plot-btn" class="main-btn" onclick="plotToMap()">Show Points on Map</button>
        <button id="snap-btn" class="main-btn" onclick="captureSnapshot()">Snap Image</button>
    </div>

    <div id="map"></div>

    <!-- Leaflet & Screenshot Engine -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-simple-map-screenshoter@0.5.0/dist/leaflet-simple-map-screenshoter.js"></script>

    <script>
        // Setup Map with Satellite View
        const map = L.map('map', { zoomControl: true }).setView([0, 0], 2);
        
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri Satellite'
        }).addTo(map);

        const markerLayer = L.featureGroup().addTo(map);
        const screenshoter = L.simpleMapScreenshoter().addTo(map);
        let activeEmoji = "📍";

        // Handle Icon Selection
        document.querySelectorAll('.icon-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.icon-btn.selected').classList.remove('selected');
                btn.classList.add('selected');
                activeEmoji = btn.dataset.icon;
            });
        });

        function plotToMap() {
            const rawData = document.getElementById('data-input').value;
            const lines = rawData.split('\n');
            markerLayer.clearLayers();

            lines.forEach(line => {
                if (!line.trim()) return;
                
                // Splitting by comma
                const parts = line.split(',');
                if (parts.length < 3) return;

                const label = parts[0].trim();
                const lon = parseFloat(parts[1].trim());
                const lat = parseFloat(parts[2].trim());

                if (!isNaN(lat) && !isNaN(lon)) {
                    // Create Custom Marker
                    const customIcon = L.divIcon({
                        html: `<div style="font-size: 30px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));">${activeEmoji}</div>`,
                        className: 'dummy-class',
                        iconSize: [35, 35],
                        iconAnchor: [17, 30]
                    });

                    L.marker([lat, lon], { icon: customIcon })
                        .bindTooltip(label, { 
                            permanent: true, 
                            direction: 'top', 
                            offset: [0, -25],
                            className: 'map-label'
                        })
                        .addTo(markerLayer);
                }
            });

            // Auto-zoom to the points
            if (markerLayer.getLayers().length > 0) {
                map.fitBounds(markerLayer.getBounds(), { padding: [100, 100] });
            }
        }

        function captureSnapshot() {
            screenshoter.takeScreen('blob').then(blob => {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Map_Capture_${Date.now()}.png`;
                a.click();
            });
        }
    </script>
</body>
</html>
