<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Spatial Snapshot</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
    <style>
        :root {
            --accent: #f97316;
            --glass: rgba(15, 23, 42, 0.9);
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        /* Compact UI */
        #ui-panel {
            position: absolute;
            top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 10; background: var(--glass);
            backdrop-filter: blur(8px);
            padding: 8px 20px; border-radius: 40px;
            display: flex; align-items: center; gap: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        input {
            background: transparent; border: none;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 4px; width: 100px; font-size: 0.8rem; outline: none;
        }

        button {
            background: var(--accent); color: white; border: none;
            padding: 6px 15px; border-radius: 20px;
            font-size: 0.7rem; font-weight: bold; cursor: pointer;
            text-transform: uppercase; transition: 0.3s;
        }

        button:hover { filter: brightness(1.2); transform: translateY(-1px); }
        #snap-btn { background: #10b981; display: none; }

        .brand {
            position: absolute; bottom: 20px; right: 20px; z-index: 5;
            color: white; text-align: right; opacity: 0.8;
        }
        .brand h1 { margin: 0; font-size: 0.9rem; letter-spacing: 2px; }
        .brand span { font-size: 0.5rem; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui-panel">
        <input type="text" id="origin" placeholder="From...">
        <input type="text" id="dest" placeholder="To...">
        <button id="trace-btn">Trace 3D</button>
        <button id="snap-btn">Capture</button>
    </div>

    <div class="brand">
        <h1>SNAPSHOT 3D</h1>
        <span>SPATIAL INVESTIGATOR</span>
    </div>

    <div id="map"></div>

    <script>
        // Replace with your actual Mapbox token from mapbox.com
        mapboxgl.accessToken = 'YOUR_MAPBOX_ACCESS_TOKEN';

        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/satellite-v9', // Natural satellite color
            center: [0, 20],
            zoom: 2,
            pitch: 45, // Initial 3D tilt
            bearing: 0,
            antialias: true,
            preserveDrawingBuffer: true // Required for capturing snapshots
        });

        map.on('load', () => {
            // Add 3D Terrain
            map.addSource('mapbox-dem', {
                'type': 'raster-dem',
                'url': 'mapbox://mapbox.mapbox-terrain-dem-v1',
                'tileSize': 512,
                'maxzoom': 14
            });
            map.setTerrain({ 'source': 'mapbox-dem', 'exaggeration': 1.5 });

            // Add Atmospheric Sky
            map.addLayer({
                'id': 'sky',
                'type': 'sky',
                'paint': {
                    'sky-type': 'atmosphere',
                    'sky-atmosphere-sun': [0.0, 0.0],
                    'sky-atmosphere-sun-intensity': 15
                }
            });
        });

        const traceBtn = document.getElementById('trace-btn');
        const snapBtn = document.getElementById('snap-btn');

        traceBtn.onclick = async () => {
            const startStr = document.getElementById('origin').value;
            const endStr = document.getElementById('dest').value;
            if (!startStr || !endStr) return;

            traceBtn.innerText = "Finding...";

            try {
                // Geocode both locations
                const geoUrl = (q) => `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(q)}.json?access_token=${mapboxgl.accessToken}`;
                const [r1, r2] = await Promise.all([fetch(geoUrl(startStr)).then(r => r.json()), fetch(geoUrl(endStr)).then(r => r.json())]);

                const p1 = r1.features[0].center;
                const p2 = r2.features[0].center;

                // Get Routing (OSRM/Mapbox)
                const routeUrl = `https://api.mapbox.com/directions/v5/mapbox/driving/${p1[0]},${p1[1]};${p2[0]},${p2[1]}?geometries=geojson&access_token=${mapboxgl.accessToken}`;
                const routeData = await fetch(routeUrl).then(r => r.json());
                const geometry = routeData.routes[0].geometry;

                // Remove existing layers if any
                if (map.getLayer('route')) { map.removeLayer('route'); map.removeSource('route'); }

                map.addSource('route', { 'type': 'geojson', 'data': { 'type': 'Feature', 'geometry': geometry } });
                
                // Add the 3D high-visibility route
                map.addLayer({
                    'id': 'route',
                    'type': 'line',
                    'source': 'route',
                    'layout': { 'line-join': 'round', 'line-cap': 'round' },
                    'paint': {
                        'line-color': '#f97316',
                        'line-width': 5,
                        'line-opacity': 0.8
                    }
                });

                // Cinematic camera move
                const coordinates = geometry.coordinates;
                const bounds = coordinates.reduce((acc, coord) => acc.extend(coord), new mapboxgl.LngLatBounds(coordinates[0], coordinates[0]));
                
                map.fitBounds(bounds, { padding: 100, pitch: 60, duration: 2000 });

                traceBtn.innerText = "Traced";
                snapBtn.style.display = "block";

            } catch (e) {
                alert("Location not found");
                traceBtn.innerText = "Trace 3D";
            }
        };

        snapBtn.onclick = () => {
            const link = document.createElement('a');
            link.download = `3D-Snapshot-${Date.now()}.png`;
            link.href = map.getCanvas().toDataURL("image/png");
            link.click();
        };
    </script>
</body>
</html>
