<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Route Snapshot Creator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        #controls { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        #map { width: 100%; max-width: 600px; height: 400px; border-radius: 12px; margin: 0 auto; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; }
        #btn-go { background: #0078d4; color: white; }
        #status { margin-top: 15px; font-weight: bold; color: #555; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; width: 140px; }
    </style>
</head>
<body>

    <div id="controls">
        <input type="text" id="start" placeholder="From">
        <input type="text" id="end" placeholder="To">
        <button id="btn-go">Create & Download Image</button>
        <div id="status">Ready</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { crossOrigin: true }).addTo(map);

        const btn = document.getElementById('btn-go');
        const status = document.getElementById('status');

        btn.onclick = async () => {
            const sCity = document.getElementById('start').value;
            const eCity = document.getElementById('end').value;
            if (!sCity || !eCity) return;

            btn.disabled = true;
            status.innerText = "Generating Route...";

            try {
                // 1. Get Points
                const s1 = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(sCity)}`).then(r => r.json());
                const s2 = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(eCity)}`).then(r => r.json());
                const start = [s1[0].lat, s1[0].lon];
                const end = [s2[0].lat, s2[0].lon];

                const rData = await fetch(`https://router.project-osrm.org/route/v1/driving/${start[1]},${start[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`).then(r => r.json());
                const points = rData.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);

                // 2. Draw the Route
                const poly = L.polyline(points, {color: '#0078d4', weight: 6}).addTo(map);
                map.fitBounds(poly.getBounds(), {padding: [40, 40]});

                // 3. Wait for tiles to load, then take a "Photo"
                status.innerText = "Capturing Image...";
                setTimeout(() => {
                    html2canvas(document.getElementById('map'), { useCORS: true }).then(canvas => {
                        const link = document.createElement('a');
                        link.download = 'my-trip.png';
                        link.href = canvas.toDataURL("image/png");
                        link.click();
                        status.innerText = "Downloaded!";
                        btn.disabled = false;
                    });
                }, 2000);

            } catch (e) {
                alert("Error");
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
