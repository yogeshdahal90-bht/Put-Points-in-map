<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Route Snapshot Creator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --accent: #f97316;
            --panel: rgba(15, 23, 42, 0.85);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; font-family: 'Segoe UI', sans-serif;
            background: #000;
        }

        /* Full-screen map */
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }

        /* Floating UI Panel */
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: var(--panel);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 5px;
            width: 120px;
            font-size: 0.85rem;
            outline: none;
        }

        input::placeholder { color: #94a3b8; }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        button:hover { filter: brightness(1.1); transform: scale(1.05); }
        button:disabled { background: #475569; }

        #status-pill {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Branding Overlay */
        .brand {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 10;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            text-align: right;
        }
        .brand h1 { margin: 0; font-size: 1rem; letter-spacing: 1px; }
        .brand span { font-size: 0.6rem; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <div class="brand">
        <h1>SNAPSHOT</h1>
        <span>SPATIAL INVESTIGATOR</span>
    </div>

    <div id="ui-layer">
        <input type="text" id="start" placeholder="From...">
        <input type="text" id="end" placeholder="To...">
        <button id="btn-go">Trace & Save</button>
    </div>

    <div id="status-pill">Ready</div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        // Initializing Map with Satellite Base (No darkening filters)
        const map = L.map('map', { 
            zoomControl: false, 
            attributionControl: false,
            preserveDrawingBuffer: true 
        }).setView([20, 0], 2);

        // Using standard ESRI Satellite imagery for high quality and natural color
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            crossOrigin: 'anonymous'
        }).addTo(map);

        const btn = document.getElementById('btn-go');
        const status = document.getElementById('status-pill');
        let routeLayer = null;

        btn.onclick = async () => {
            const sCity = document.getElementById('start').value;
            const eCity = document.getElementById('end').value;
            if (!sCity || !eCity) return;

            if(routeLayer) map.removeLayer(routeLayer);

            btn.disabled = true;
            status.innerText = "Finding coordinates...";

            try {
                const s1 = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(sCity)}`).then(r => r.json());
                const s2 = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(eCity)}`).then(r => r.json());
                
                const start = [s1[0].lat, s1[0].lon];
                const end = [s2[0].lat, s2[0].lon];

                status.innerText = "Mapping path...";
                const rData = await fetch(`https://router.project-osrm.org/route/v1/driving/${start[1]},${start[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`).then(r => r.json());
                const points = rData.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);

                // High-visibility route style
                routeLayer = L.featureGroup([
                    L.polyline(points, {color: '#f97316', weight: 8, opacity: 0.5}),
                    L.polyline(points, {color: '#ffffff', weight: 3, opacity: 0.9})
                ]).addTo(map);

                map.fitBounds(routeLayer.getBounds(), {padding: [100, 100]});

                status.innerText = "Capturing...";
                // Short delay to ensure tiles render
                setTimeout(() => {
                    html2canvas(document.getElementById('map'), { 
                        useCORS: true,
                        logging: false
                    }).then(canvas => {
                        const link = document.createElement('a');
                        link.download = `Route-${sCity}-${eCity}.png`;
                        link.href = canvas.toDataURL("image/png");
                        link.click();
                        status.innerText = "Success";
                        btn.disabled = false;
                    });
                }, 1000);

            } catch (e) {
                status.innerText = "Error locating path";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
