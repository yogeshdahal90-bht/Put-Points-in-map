<!DOCTYPE html>
<html>
<head>
    <title>Infrastructure Data Extractor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #controls { background: #1e293b; color: white; padding: 15px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; z-index: 1000; }
        #map { flex-grow: 1; background: #f1f5f9; }
        
        .group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.7rem; text-transform: uppercase; color: #94a3b8; font-weight: bold; }
        select, button { padding: 8px; border-radius: 4px; border: none; font-size: 0.85rem; }
        
        #layer-selector { display: flex; flex-wrap: wrap; gap: 10px; padding: 5px 0; }
        .chip { display: flex; align-items: center; gap: 5px; background: #334155; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; border: 1px solid transparent; }
        .chip.active { border-color: #f97316; background: #475569; }
        
        button { background: #f97316; color: white; cursor: pointer; font-weight: bold; margin-top: auto; }
        button:hover { background: #ea580c; }
        #status { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.8); color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.7rem; z-index: 1001; }
    </style>
</head>
<body>

    <div id="controls">
        <div class="group">
            <label>Location Search</label>
            <input type="text" id="loc-input" placeholder="City, State, Country..." style="padding:8px; border-radius:4px;">
        </div>
        
        <div class="group">
            <label>Infrastructure Layers</label>
            <div id="layer-selector">
                <div class="chip active" data-tag="highway">Roads</div>
                <div class="chip" data-tag="waterway">Rivers</div>
                <div class="chip" data-tag="amenity=school">Schools</div>
                <div class="chip" data-tag="amenity=hospital,amenity=clinic">Health</div>
                <div class="chip" data-tag="cycleway">Cycle Tracks</div>
            </div>
        </div>

        <button onclick="fetchProjectData()">Fetch & Zoom</button>
        <button onclick="downloadPNG()" style="background:#10b981;">Snap Map</button>
    </div>

    <div id="status">Ready</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-simple-map-screenshoter@0.5.0/dist/leaflet-simple-map-screenshoter.js"></script>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([-30.748, 121.465], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const screenshoter = L.simpleMapScreenshoter().addTo(map);

        // UI Logic for Chips
        document.querySelectorAll('.chip').forEach(chip => {
            chip.onclick = () => chip.classList.toggle('active');
        });

        let currentLayers = L.featureGroup().addTo(map);

        async function fetchProjectData() {
            const loc = document.getElementById('loc-input').value;
            const status = document.getElementById('status');
            if(!loc) return alert("Enter a location");

            status.innerText = "Geocoding location...";
            
            try {
                // 1. Geocode to find the area
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(loc)}`).then(r => r.json());
                if(!geoRes.length) throw new Error("Location not found");
                
                const { lat, lon, boundingbox } = geoRes[0];
                map.fitBounds([[boundingbox[0], boundingbox[2]], [boundingbox[1], boundingbox[3]]]);

                // 2. Build Overpass Query based on selected chips
                status.innerText = "Querying Infrastructure...";
                const activeTags = Array.from(document.querySelectorAll('.chip.active')).map(c => c.dataset.tag);
                
                let queryParts = "";
                activeTags.forEach(tag => {
                    if(tag.includes(',')) {
                        tag.split(',').forEach(sub => queryParts += `node[${sub}]({{bbox}});way[${sub}]({{bbox}});`);
                    } else if(tag.includes('=')) {
                        queryParts += `node[${tag}]({{bbox}});way[${tag}]({{bbox}});`;
                    } else {
                        queryParts += `way[${tag}]({{bbox}});`;
                    }
                });

                const query = `[out:json][timeout:30];(${queryParts});out geom;`;
                const bbox = `${map.getBounds().getSouth()},${map.getBounds().getWest()},${map.getBounds().getNorth()},${map.getBounds().getEast()}`;
                const finalUrl = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query.replace(/{{bbox}}/g, bbox))}`;

                const data = await fetch(finalUrl).then(r => r.json());
                
                // 3. Render Vector Data
                currentLayers.clearLayers();
                const features = data.elements.map(el => {
                    const isPoint = el.type === 'node';
                    return {
                        type: "Feature",
                        properties: el.tags,
                        geometry: {
                            type: isPoint ? "Point" : "LineString",
                            coordinates: isPoint ? [el.lon, el.lat] : el.geometry.map(p => [p.lon, p.lat])
                        }
                    };
                });

                L.geoJSON(features, {
                    style: (f) => {
                        if (f.properties.waterway) return { color: "#0ea5e9", weight: 3 };
                        if (f.properties.cycleway) return { color: "#8b5cf6", weight: 3, dashArray: '5,5' };
                        return { color: "#f97316", weight: 2 };
                    },
                    pointToLayer: (f, latlng) => {
                        return L.circleMarker(latlng, { radius: 6, fillColor: "#ef4444", color: "#fff", weight: 2, fillOpacity: 1 });
                    }
                }).addTo(currentLayers);

                status.innerText = `Loaded ${features.length} assets.`;

            } catch (e) {
                status.innerText = "Error: " + e.message;
            }
        }

        function downloadPNG() {
            screenshoter.takeScreen('blob').then(blob => {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Infrastructure_${Date.now()}.png`;
                a.click();
            });
        }
    </script>
</body>
</html>
