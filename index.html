<script>
    // 1. Setup Map
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    let carMarker, routeLine;

    async function getCoords(city) {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}`);
        const data = await res.json();
        return data.length > 0 ? [data[0].lat, data[0].lon] : null;
    }

    async function getRoute(start, end) {
        const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${start[1]},${start[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`);
        const data = await res.json();
        return data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
    }

    btn.onclick = async () => {
        const sCity = document.getElementById('start').value;
        const eCity = document.getElementById('end').value;
        if (!sCity || !eCity) return alert("Enter cities");

        btn.disabled = true;
        status.innerText = "Processing...";

        const startCoords = await getCoords(sCity);
        const endCoords = await getCoords(eCity);
        if (!startCoords || !endCoords) {
            alert("Location not found");
            btn.disabled = false;
            return;
        }

        const routePoints = await getRoute(startCoords, endCoords);

        if (routeLine) map.removeLayer(routeLine);
        if (carMarker) map.removeLayer(carMarker);

        routeLine = L.polyline(routePoints, {color: '#0078d4', weight: 6}).addTo(map);
        
        // IMPORTANT: Wait for map to finish zooming before animating
        map.flyToBounds(routeLine.getBounds(), { padding: [50, 50] });

        map.once('moveend', () => {
            startTrip(routePoints);
        });
    };

    function startTrip(points) {
        status.innerText = "Recording...";
        
        // Ensure the map container is ready for capture
        const mapDiv = document.getElementById('map');
        const stream = mapDiv.captureStream ? mapDiv.captureStream(30) : mapDiv.mozCaptureStream(30);
        
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'trip.webm';
            a.click();
            status.innerText = "Video Downloaded!";
            btn.disabled = false;
        };

        recorder.start();

        carMarker = L.circleMarker(points[0], { radius: 10, color: 'white', fillColor: '#28a745', fillOpacity: 1 }).addTo(map);

        let step = 0;
        const total = points.length;
        const jump = Math.max(1, Math.floor(total / 100)); 

        const anim = setInterval(() => {
            if (step >= total) {
                clearInterval(anim);
                setTimeout(() => recorder.stop(), 1000);
            } else {
                carMarker.setLatLng(points[step]);
                step += jump;
            }
        }, 40);
    }
</script>
