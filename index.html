<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Route Snapshot Creator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary: #f97316; /* Vibrant Orange */
            --primary-glow: rgba(249, 115, 22, 0.4);
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            text-align: center; 
            background-color: var(--bg);
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
            color: white;
            margin: 0;
            padding: 40px 20px;
        }

        #controls { 
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 25px; 
            border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.1);
            display: inline-block;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #map { 
            width: 100%; 
            max-width: 800px; 
            height: 500px; 
            border-radius: 20px; 
            margin: 0 auto; 
            border: 4px solid var(--glass);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        input { 
            padding: 12px 16px; 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 10px; 
            width: 180px; 
            background: rgba(15, 23, 42, 0.6);
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }

        button { 
            padding: 12px 24px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            background: linear-gradient(45deg, var(--primary), #fb923c);
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px var(--primary-glow); }
        button:disabled { background: #475569; cursor: not-allowed; box-shadow: none; }

        #status { margin-top: 15px; font-size: 14px; letter-spacing: 1px; color: var(--text-dim); text-transform: uppercase; }
        
        /* Custom Map Tiles styling via CSS filter to make them "pop" */
        .leaflet-tile-container { filter: brightness(0.6) invert(1) contrast(3) hue-rotate(170deg) brightness(0.4); }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 20px; font-weight: 300; letter-spacing: 2px;">ROUTE <span style="color:var(--primary); font-weight: 800;">SNAPSHOT</span></h2>

    <div id="controls">
        <input type="text" id="start" placeholder="Origin City">
        <input type="text" id="end" placeholder="Destination">
        <button id="btn-go">Trace & Export</button>
        <div id="status">Ready for exploration</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        // Dark themed base map
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { crossOrigin: true }).addTo(map);

        const btn = document.getElementById('btn-go');
        const status = document.getElementById('status');
        let currentRoute = null;

        btn.onclick = async () => {
            const sCity = document.getElementById('start').value;
            const eCity = document.getElementById('end').value;
            if (!sCity || !eCity) return;

            if(currentRoute) map.removeLayer(currentRoute);

            btn.disabled = true;
            status.innerText = "🛰️ Locating Coordinates...";

            try {
                const s1 = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(sCity)}`).then(r => r.json());
                const s2 = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(eCity)}`).then(r => r.json());
                
                if (!s1.length || !s2.length) throw new Error("Location not found");

                const start = [s1[0].lat, s1[0].lon];
                const end = [s2[0].lat, s2[0].lon];

                status.innerText = "🛣️ Calculating Vibrant Path...";
                const rData = await fetch(`https://router.project-osrm.org/route/v1/driving/${start[1]},${start[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`).then(r => r.json());
                const points = rData.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);

                // Draw the Route with a "Glow" effect using multiple lines
                currentRoute = L.featureGroup([
                    L.polyline(points, {color: '#f97316', weight: 8, opacity: 0.3}), // outer glow
                    L.polyline(points, {color: '#ffffff', weight: 3, opacity: 0.8})  // core line
                ]).addTo(map);

                map.fitBounds(currentRoute.getBounds(), {padding: [50, 50]});

                status.innerText = "📸 Capturing Discovery...";
                setTimeout(() => {
                    html2canvas(document.getElementById('map'), { useCORS: true, backgroundColor: null }).then(canvas => {
                        const link = document.createElement('a');
                        link.download = `Trip-${sCity}-to-${eCity}.png`;
                        link.href = canvas.toDataURL("image/png");
                        link.click();
                        status.innerText = "✅ Snapshot Saved!";
                        btn.disabled = false;
                    });
                }, 1500);

            } catch (e) {
                status.innerText = "❌ Path Unavailable";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
