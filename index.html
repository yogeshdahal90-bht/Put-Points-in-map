<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Cartography Tool</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        :root { --sidebar-bg: #1e293b; --accent: #f97316; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; background: #0f172a; }
        
        /* Sidebar */
        #panel { 
            width: 380px; background: var(--sidebar-bg); color: white; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px; z-index: 2000; box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }
        h2 { font-size: 0.85rem; margin: 0; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        textarea { width: 100%; height: 100px; background: #334155; border: 1px solid #475569; border-radius: 4px; color: white; padding: 8px; font-family: monospace; font-size: 0.8rem; }
        
        .icon-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .icon-btn { background: #334155; border: 2px solid transparent; border-radius: 6px; padding: 8px; font-size: 1.2rem; cursor: pointer; text-align: center; }
        .icon-btn.selected { border-color: var(--accent); background: #475569; }

        .toggle-box { font-size: 0.85rem; display: flex; align-items: center; gap: 10px; color: #94a3b8; }
        button.main-btn { padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #plot-btn { background: var(--accent); color: white; }
        #snap-btn { background: #10b981; color: white; }

        /* Map Workspace */
        #map-wrapper { flex-grow: 1; position: relative; border: 10px solid #1e293b; box-sizing: border-box; }
        #map { width: 100%; height: 100%; }

        /* Custom Overlays (Inside Map for Screen Capture) */
        .map-overlay { position: absolute; z-index: 1000; pointer-events: none; }
        
        #north-arrow-container { top: 20px; right: 20px; width: 60px; text-align: center; }
        #north-arrow-svg { width: 50px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }

        #locator-container { bottom: 20px; right: 20px; width: 180px; height: 130px; border: 3px solid white; box-shadow: 0 0 15px rgba(0,0,0,0.5); pointer-events: auto; }
        #locator-map { width: 100%; height: 100%; }

        /* Legend/List Overlay */
        #legend-overlay { 
            top: 20px; left: 20px; background: rgba(255,255,255,0.9); 
            padding: 10px; border-radius: 4px; border: 1px solid #ccc; 
            color: #333; font-size: 0.8rem; min-width: 120px; display: none;
        }
        #legend-overlay h3 { margin: 0 0 5px 0; font-size: 0.75rem; border-bottom: 1px solid #ddd; }
        #legend-list { list-style: none; padding: 0; margin: 0; }
        #legend-list li { margin-bottom: 3px; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

    <div id="panel">
        <h2>1. Asset Data</h2>
        <textarea id="data-input" placeholder="Point A, 121.46, -30.74"></textarea>

        <h2>2. Symbol</h2>
        <div class="icon-grid" id="icon-picker">
            <div class="icon-btn selected" data-icon="📍">📍</div>
            <div class="icon-btn" data-icon="🏥">🏥</div>
            <div class="icon-btn" data-icon="🏗️">🏗️</div>
            <div class="icon-btn" data-icon="💧">💧</div>
            <div class="icon-btn" data-icon="🚧">🚧</div>
            <div class="icon-btn" data-icon="⚡">⚡</div>
            <div class="icon-btn" data-icon="🏫">🏫</div>
            <div class="icon-btn" data-icon="🌳">🌳</div>
        </div>

        <div class="toggle-box">
            <input type="checkbox" id="show-legend" onchange="toggleLegend()"> 
            <label for="show-legend">Show Location List on Map</label>
        </div>

        <button id="plot-btn" class="main-btn" onclick="plotToMap()">Generate View</button>
        <button id="snap-btn" class="main-btn" onclick="captureSnapshot()">Export Report PNG</button>
    </div>

    <div id="map-wrapper">
        <div id="map"></div>
        
        <!-- Legend Overlay -->
        <div id="legend-overlay" class="map-overlay">
            <h3>Asset Inventory</h3>
            <ul id="legend-list"></ul>
        </div>

        <!-- North Arrow -->
        <div id="north-arrow-container" class="map-overlay">
            <svg id="north-arrow-svg" viewBox="0 0 100 100">
                <path d="M50 2 L20 90 L50 75 L80 90 Z" fill="#f97316" stroke="white" stroke-width="3"/>
                <text x="50" y="105" text-anchor="middle" fill="white" font-weight="bold" font-size="20">N</text>
            </svg>
        </div>

        <!-- Locator Map -->
        <div id="locator-container" class="map-overlay">
            <div id="locator-map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-simple-map-screenshoter@0.5.0/dist/leaflet-simple-map-screenshoter.js"></script>

    <script>
        // MAIN MAP
        const map = L.map('map', { zoomControl: false }).setView([-30.748, 121.465], 14);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri Satellite'
        }).addTo(map);

        L.control.scale({ imperial: false, position: 'bottomleft' }).addTo(map);

        // LOCATOR MAP
        const locatorMap = L.map('locator-map', { attributionControl: false, zoomControl: false });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(locatorMap);
        
        // Extent Rectangle for Locator
        const extentRect = L.rectangle([[0,0],[0,0]], {color: "#ff0000", weight: 2, fillOpacity: 0.1}).addTo(locatorMap);

        function updateLocator() {
            locatorMap.setView(map.getCenter(), Math.max(0, map.getZoom() - 7));
            extentRect.setBounds(map.getBounds());
        }
        map.on('move', updateLocator);

        const markerLayer = L.featureGroup().addTo(map);
        const screenshoter = L.simpleMapScreenshoter({ hidden: true }).addTo(map);
        let activeEmoji = "📍";

        // Icon Logic
        document.querySelectorAll('.icon-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelector('.icon-btn.selected').classList.remove('selected');
                btn.classList.add('selected');
                activeEmoji = btn.dataset.icon;
            };
        });

        function toggleLegend() {
            document.getElementById('legend-overlay').style.display = 
                document.getElementById('show-legend').checked ? 'block' : 'none';
        }

        function plotToMap() {
            const lines = document.getElementById('data-input').value.split('\n');
            markerLayer.clearLayers();
            const list = document.getElementById('legend-list');
            list.innerHTML = "";

            lines.forEach(line => {
                if (!line.trim()) return;
                const parts = line.split(',');
                if (parts.length < 3) return;

                const label = parts[0].trim();
                const lon = parseFloat(parts[1].trim());
                const lat = parseFloat(parts[2].trim());

                if (!isNaN(lat) && !isNaN(lon)) {
                    // Add to Map
                    const icon = L.divIcon({
                        html: `<div style="font-size: 28px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));">${activeEmoji}</div>`,
                        className: 'asset-marker', iconSize: [30,30], iconAnchor: [15,25]
                    });
                    L.marker([lat, lon], { icon: icon }).bindTooltip(label, { permanent: true, direction: 'top', offset: [0,-20] }).addTo(markerLayer);

                    // Add to Legend List
                    const li = document.createElement('li');
                    li.innerHTML = `<span>${activeEmoji}</span> ${label}`;
                    list.appendChild(li);
                }
            });

            if (markerLayer.getLayers().length > 0) {
                map.fitBounds(markerLayer.getBounds(), { padding: [100, 100] });
                updateLocator();
            }
        }

        function captureSnapshot() {
            // Captures the entire map-wrapper including overlays
            screenshoter.takeScreen('blob').then(blob => {
                const a = document.createElement('a');
                a.href = window.URL.createObjectURL(blob);
                a.download = `GIS_Report_${Date.now()}.png`;
                a.click();
            });
        }
    </script>
</body>
</html>
