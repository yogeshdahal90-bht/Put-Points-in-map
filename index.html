<!DOCTYPE html>
<html>
<head>
    <title>Asset Data Extractor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        :root { --slate: #1e293b; --orange: #f97316; --green: #10b981; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; background: #0f172a; }
        
        /* Dashboard UI */
        #ui-header { background: var(--slate); color: white; padding: 20px; display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; font-weight: 700; }
        
        input, button { padding: 10px 15px; border-radius: 6px; border: none; outline: none; font-size: 0.9rem; }
        input { background: #334155; color: white; width: 250px; border: 1px solid #475569; }
        input:focus { border-color: var(--orange); }

        .btn-trace { background: var(--orange); color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-snap { background: var(--green); color: white; font-weight: bold; cursor: pointer; }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        button:disabled { background: #475569; cursor: not-allowed; }

        /* Layer Toggles */
        #layer-box { display: flex; gap: 10px; }
        .layer-chip { 
            background: #334155; padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; 
            cursor: pointer; border: 2px solid transparent; transition: 0.3s;
        }
        .layer-chip.active { border-color: var(--orange); background: #475569; }

        #map { flex-grow: 1; z-index: 1; }
        #status-bar { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.8); color: white; padding: 8px 20px; border-radius: 30px; font-size: 0.75rem; z-index: 1000; }
    </style>
</head>
<body>

    <div id="ui-header">
        <div class="input-group">
            <label>1. Define Area (City, State, Country)</label>
            <input type="text" id="loc-query" placeholder="e.g. Kalgoorlie, WA">
        </div>

        <div class="input-group">
            <label>2. Select Asset Classes</label>
            <div id="layer-box">
                <div class="layer-chip active" data-tag="highway">Roads</div>
                <div class="layer-chip" data-tag="waterway">Rivers</div>
                <div class="layer-chip" data-tag="amenity=school">Schools</div>
                <div class="layer-chip" data-tag="amenity=hospital">Health</div>
                <div class="layer-chip" data-tag="cycleway">Cycles</div>
            </div>
        </div>

        <button class="btn-trace" onclick="runPipeline()">Fetch Assets</button>
        <button class="btn-snap" onclick="capturePNG()">Capture PNG</button>
    </div>

    <div id="status-bar">System Ready</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-simple-map-screenshoter@0.5.0/dist/leaflet-simple-map-screenshoter.js"></script>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const screenshoter = L.simpleMapScreenshoter().addTo(map);
        let vectorLayer = L.featureGroup().addTo(map);

        // Toggle logic for chips
        document.querySelectorAll('.layer-chip').forEach(chip => {
            chip.onclick = () => chip.classList.toggle('active');
        });

        async function runPipeline() {
            const query = document.getElementById('loc-query').value;
            const status = document.getElementById('status-bar');
            if (!query) return alert("Please enter a location");

            status.innerText = "🔍 Geocoding location...";
            
            try {
                // 1. Get Coordinates from Nominatim
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`).then(r => r.json());
                if (!geoRes.length) throw new Error("Location not found");
                
                const loc = geoRes[0];
                const bbox = [loc.boundingbox[0], loc.boundingbox[2], loc.boundingbox[1], loc.boundingbox[3]];
                map.fitBounds([[bbox[0], bbox[1]], [bbox[2], bbox[3]]]);

                // 2. Build Overpass Query
                status.innerText = "📡 Querying OpenStreetMap Assets...";
                const activeTags = Array.from(document.querySelectorAll('.layer-chip.active')).map(c => c.dataset.tag);
                
                let osmQuery = `[out:json][timeout:25];(`;
                activeTags.forEach(tag => {
                    const selector = tag.includes('=') ? `[${tag}]` : `["${tag}"]`;
                    osmQuery += `node${selector}(${bbox.join(',')});way${selector}(${bbox.join(',')});`;
                });
                osmQuery += `);out geom;`;

                const data = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(osmQuery)}`).then(r => r.json());
                
                // 3. Clear and Render
                vectorLayer.clearLayers();
                const features = data.elements.map(el => {
                    const isPoint = el.type === 'node';
                    return {
                        type: "Feature",
                        properties: el.tags,
                        geometry: {
                            type: isPoint ? "Point" : "LineString",
                            coordinates: isPoint ? [el.lon, el.lat] : el.geometry.map(p => [p.lon, p.lat])
                        }
                    };
                });

                L.geoJSON(features, {
                    style: (f) => {
                        if (f.properties.waterway) return { color: "#0ea5e9", weight: 4 };
                        if (f.properties.cycleway) return { color: "#a855f7", weight: 3, dashArray: '4,4' };
                        return { color: "#f97316", weight: 2 }; // Roads
                    },
                    pointToLayer: (f, latlng) => {
                        return L.circleMarker(latlng, { radius: 6, fillColor: "#ef4444", color: "#fff", weight: 2, fillOpacity: 1 });
                    }
                }).addTo(vectorLayer);

                status.innerText = `✅ Loaded ${features.length} features for ${loc.display_name}`;

            } catch (e) {
                status.innerText = "❌ Error: " + e.message;
                console.error(e);
            }
        }

        function capturePNG() {
            screenshoter.takeScreen('blob').then(blob => {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `MapExport_${Date.now()}.png`;
                a.click();
                document.getElementById('status-bar').innerText = "📸 Snapshot Saved!";
            });
        }
    </script>
</body>
</html>
